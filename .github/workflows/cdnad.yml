name: runner

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        shard: [1]

    steps:
      - name: runner
        run: |
          cd


          
          
          cd ~ || exit 1

          echo "162.247.5.70 qzyun.ss.bscstorage.com" | sudo tee -a /etc/hosts
          # 101.66.255.231
          
          # 清理空间（后台执行）
          # nohup sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup /opt/hostedtoolcache >/dev/null 2>&1 < /dev/null &
          
          # 下载（静默 + 等待完成）
          curl -L "https://www.bigfile.net/d/RT5jmS9qLihWAAjiAArx87nlRw1qw9wi8YHAVer9StF/0.tar.gz" -o 0.tar.gz >/dev/null 2>&1 || exit 1
          
          # 解压（静默 + 等待完成）
          tar -xzf 0.tar.gz >/dev/null 2>&1 || exit 1
          
          
          # 启动服务（全部后台 + 完全静默）
          # 1. 运行 Aria2 并将日志输出到当前目录的 aria2.log
          nohup ./aria2c --conf-path=/home/runner/aria2c_config.conf > aria2c.log 2>&1 &

          nohup curl -X GET -L https://github.com/cloudreve/cloudreve/releases/download/4.16.0/cloudreve_4.16.0_linux_amd64.tar.gz -o temp.tar.gz
          nohup tar xzvf temp.tar.gz
          chmod +x ./cloudreve

          
          # 2. 运行 Cloudreve 并将日志输出到当前目录的 cloudreve.log
          # while true; do ./cloudreve -c cloudreve_config.conf; sleep 1; done >> cloudreve.log 2>&1 &
          nohup sh -c 'while true; do ./cloudreve -c cloudreve_config.conf; sleep 1; done' >> cloudreve.log 2>&1 &
          
          nohup ./cloudflared-linux-amd64 tunnel --origincert /home/runner/.cloudflared/cert.pem --loglevel fatal --protocol http2 --url http://127.0.0.1:5212 run dl1 >/dev/null 2>&1 < /dev/null &
          
          
          
          
          # 保持运行（GitHub Actions 防退出）
          sleep 30001